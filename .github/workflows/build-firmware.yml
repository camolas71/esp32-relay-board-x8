name: Build Firmware

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Prepare source file
        run: |
          mkdir -p src
          cp esp32_relay_ota_webui.ino src/main.cpp

      - name: Build (USB env)
        run: pio run -e esp32usb
